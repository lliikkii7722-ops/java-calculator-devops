apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculator
  template:
    metadata:
      labels:
        app: calculator
    spec:
      containers:
        - name: calculator
          image: likitha72/java-calculator:latest
          imagePullPolicy: Always
          command: ["sh", "-c"]
          args:
            - java -jar /app/app.jar && sleep 3600
---
apiVersion: v1
kind: Service
metadata:
  name: calculator-app-service
spec:
  type: NodePort
  selector:
    app: calculator
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30007