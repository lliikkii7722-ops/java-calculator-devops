apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-calculator
  template:
    metadata:
      labels:
        app: java-calculator
    spec:
      containers:
        - name: java-calculator
          image: java-calculator:latest
          ports:
            - containerPort: 9090