<!DOCTYPE html>
<html>
<head>
    <title>🔥 Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1e1e2f;
            font-family: Arial;
        }

        .calculator {
            background: #2c2c3e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px black;
        }

        .display {
            width: 100%;
            height: 60px;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: right;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .num { background: #3b3b55; color: white; }
        .op { background: orange; color: white; }
        .eq { background: green; color: white; }
        .clr { background: red; color: white; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clr" onclick="clearDisplay()">C</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="op" onclick="append('*')">*</button>
        <button class="op" onclick="append('-')">-</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('+')">+</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="eq" onclick="calculate()">=</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="num" onclick="append('0')">0</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(value) {
        const operators = ['+', '-', '*', '/'];
        const lastChar = display.value.slice(-1);

        if (operators.includes(value)) {
            if (display.value === "") return;

            if (operators.includes(lastChar)) {
                display.value = display.value.slice(0, -1) + value;
                return;
            }
        }

        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function calculate() {
        try {
            let expr = display.value;

            if (!expr) {
                display.value = "Error";
                return;
            }

            const lastChar = expr.slice(-1);
            if (['+', '-', '*', '/'].includes(lastChar)) {
                display.value = "Error";
                return;
            }

            let result = Function('"use strict"; return (' + expr + ')')();

            if (!isFinite(result)) {
                display.value = "Error";
                return;
            }

            display.value = Number(result.toFixed(8)).toString();
        } catch (e) {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
